name: Build 完整版纯C++
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: CMake编译
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --config Release
      - name: 上传单EXE
        uses: actions/upload-artifact@v4
        with:
          name: 小说创作器_纯C++完整单文件
          path: build/Release/NovelWriter.exe
