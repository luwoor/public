name: Build 纯C++原生版
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: 编译程序
        run: cmake --build build --config Release

      - name: 上传单EXE文件
        uses: actions/upload-artifact@v4
        with:
          name: 小说创作器_纯C++原生单文件
          path: build/Release/NovelWriter.exe
